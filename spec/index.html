<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Specification &mdash; Open Portable Entitlement</title>
  <meta name="description" content="OPE Draft Specification v0.1 — A portable entitlement layer for gated content discovered through feeds and decentralized publishing.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- ─── Nav ──────────────────────────────────────── -->
  <nav class="nav">
    <div class="container nav__inner">
      <a href="../" class="nav__logo">
        <span class="nav__logo-mark">OPE</span>
        Open Portable Entitlement
      </a>
      <ul class="nav__links">
        <li><a href="../#how-it-works" class="hide-mobile">How It Works</a></li>
        <li><a href="./">Specification</a></li>
        <li><a href="https://github.com/shellen/open-portable-entitlement" class="btn btn--sm btn--primary">GitHub</a></li>
      </ul>
    </div>
  </nav>

  <!-- ─── Spec Content ─────────────────────────────── -->
  <div class="spec-page">
    <div class="container container--narrow spec-content" id="spec">
      <noscript>
        <p>This page renders the specification from Markdown. Please enable JavaScript, or <a href="../OPE-Specification.md">read the raw Markdown file</a>.</p>
      </noscript>
    </div>
  </div>

  <!-- ─── Footer ───────────────────────────────────── -->
  <footer class="footer">
    <div class="container">
      <p>
        OPE is a working draft by <a href="https://shellen.com">Jason Shellen</a>.
        Discuss and contribute on <a href="https://github.com/shellen/open-portable-entitlement">GitHub</a>.
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script>
    (async function () {
      const container = document.getElementById('spec');
      try {
        const res = await fetch('../OPE-Specification.md');
        if (!res.ok) throw new Error(res.statusText);
        const md = await res.text();
        container.innerHTML = marked.parse(md);
      } catch (e) {
        container.innerHTML =
          '<p>Could not load the specification. <a href="../OPE-Specification.md">View the raw Markdown instead.</a></p>';
      }
    })();
  </script>

</body>
</html>
